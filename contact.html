<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ArcCentrx — Get in touch</title>
<meta name="description" content="Let's start a conversation. Tell us about your goals, challenges, or opportunities. We'll get back to you shortly.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="contact">
<div data-site-header></div>

<section class="intro-band">
  <div class="intro-inner">
    <h1 class="reveal">Let's Start a Conversation</h1>
    <p class="subhead reveal" data-delay="1">Tell us about your goals, challenges, or opportunities. We'll get back to you shortly.</p>
  </div>
</section>

<section class="white">
  <div class="contact-row">
    <div class="contact-card reveal">
      <form data-contact-form novalidate>
        <!-- Honeypot: hidden from humans; bots that fill it are silently dropped. -->
        <input type="text" name="company_website" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name">
        </div>
        <div class="field">
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" placeholder="you@company.com" required>
        </div>
        <div class="field">
          <label for="subject">Subject</label>
          <input id="subject" name="subject" type="text" placeholder="What's this about?">
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Tell us about your goals, challenges, or opportunities."></textarea>
        </div>
        <button class="btn btn-teal" type="submit">Send</button>
        <div class="form-note" role="status" aria-live="polite"></div>
      </form>
    </div>

    <div class="info-block reveal" data-delay="1">
      <h3>Reach us directly</h3>
      <div class="info-row">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:18px"><path d="M12 21s7-6.4 7-11.5A7 7 0 0 0 5 9.5C5 14.6 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.3"/></svg></span>
        <div><div class="lbl">Address</div><div class="val" style="font-weight:400;color:var(--body);">123 Business Avenue, Suite 400, United States</div></div>
      </div>
      <div class="info-row">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:18px"><path d="M6 3.5h3l1.4 4.2-2.1 1.7a13 13 0 0 0 6.3 6.3l1.7-2.1 4.2 1.4v3a1.5 1.5 0 0 1-1.6 1.5C11.6 19 5 12.4 4.5 5.6 4.4 4.6 5.1 3.5 6 3.5z"/></svg></span>
        <div><div class="lbl">Phone</div><div class="val"><a href="tel:+15125550123">+1 (512) 555-0123</a></div></div>
      </div>
      <div class="info-row">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:18px"><rect x="3" y="5.5" width="18" height="13" rx="2"/><path d="M3.5 6.5l8.5 6.5 8.5-6.5"/></svg></span>
        <div><div class="lbl">Email</div><div class="val"><a href="mailto:hello@arccentrx.com">hello@arccentrx.com</a></div></div>
      </div>
    </div>
  </div>
</section>

<!-- ============================ CTA ============================ -->
<section class="cta-band">
  <div class="section-inner reveal">
    <h2>Ready to talk?</h2>
    <a class="btn btn-bright-teal" href="mailto:hello@arccentrx.com">Get in touch</a>
  </div>
</section>

<div data-site-footer></div>
<script src="assets/site.js"></script>
</body>
</html>
