<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ArcCentrx — Get in touch</title>
<meta name="description" content="Let's start a conversation. Tell us about your goals, challenges, or opportunities. We'll get back to you shortly.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.png" sizes="any">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="contact">
<div data-site-header></div>

<section class="intro-band">
  <div class="intro-inner">
    <h1 class="reveal">Let's Start a Conversation</h1>
    <p class="subhead reveal" data-delay="1">Tell us about your goals, challenges, or opportunities. We'll get back to you shortly.</p>
  </div>
</section>

<section class="white">
  <div class="contact-row" style="display:block;max-width:640px;">
    <div class="contact-card reveal">
      <form data-contact-form novalidate>
        <!-- Honeypot: hidden from humans; bots that fill it are silently dropped. -->
        <input type="text" name="company_website" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name">
        </div>
        <div class="field">
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" placeholder="you@company.com" required>
        </div>
        <div class="field">
          <label for="subject">Subject</label>
          <input id="subject" name="subject" type="text" placeholder="What's this about?">
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Tell us about your goals, challenges, or opportunities."></textarea>
        </div>
        <button class="btn btn-teal" type="submit">Send</button>
        <div class="form-note" role="status" aria-live="polite"></div>
      </form>
    </div>
  </div>
</section>

<!-- ============================ CTA ============================ -->
<section class="cta-band">
  <div class="section-inner reveal">
    <h2>Ready to talk?</h2>
    <a class="btn btn-bright-teal" href="mailto:hello@arccentrx.com">Get in touch</a>
  </div>
</section>

<div data-site-footer></div>
<script src="assets/site.js"></script>
</body>
</html>
